<text x="257" y="72" font-size="13" font-weight="500" fill="#4B1528" text-anchor="middle">You — admin</text>
<text x="257" y="88" font-size="11" fill="#993556" text-anchor="middle">manage catalog</text>
<rect x="350" y="50" width="145" height="48" rx="4" fill="#E1F5EE" stroke="#1D9E75"/>
<text x="422" y="72" font-size="13" font-weight="500" fill="#04342C" text-anchor="middle">Vendors</text>
<text x="422" y="88" font-size="11" fill="#0F6E56" text-anchor="middle">produce &amp; ship</text>
