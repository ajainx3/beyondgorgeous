<svg width="100%" viewBox="0 0 680 556" role="img" xmlns="http://www.w3.org/2000/svg">
<title>BeyondGorgeous layered architecture</title>
<desc>Layered diagram: actors, the Next.js edge, a modular application core, an integration layer, an async backbone, data stores, and external partners. Pink boxes are owned by BeyondGorgeous, teal are external partners, gray is infrastructure.</desc>
<defs>
<marker id="ah" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#888780"/></marker>
</defs>
<g font-family="ui-sans-serif, system-ui, sans-serif">
<rect x="20" y="10" width="12" height="12" rx="3" fill="#FBEAF0" stroke="#D4537E"/>
<text x="38" y="20" font-size="11" fill="#2C2C2A">you own</text>
<rect x="120" y="10" width="12" height="12" rx="3" fill="#E1F5EE" stroke="#1D9E75"/>
<text x="138" y="20" font-size="11" fill="#2C2C2A">external partner</text>
<rect x="262" y="10" width="12" height="12" rx="3" fill="#F1EFE8" stroke="#888780"/>
